<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Visualizer - From Scratch</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap');
        
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151935;
            --accent-cyan: #00fff5;
            --accent-magenta: #ff00e5;
            --accent-yellow: #ffea00;
            --grid-color: rgba(0, 255, 245, 0.1);
            --text-primary: #e0e6ff;
            --text-secondary: #8892b8;
            --positive-weight: #00ff88;
            --negative-weight: #ff0055;
            --neuron-active: #00fff5;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }
        
        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(0, 255, 245, 0.1) 0%, rgba(255, 0, 229, 0.1) 100%);
            border: 2px solid var(--accent-cyan);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(0, 255, 245, 0.1) 50%, transparent 70%);
            animation: headerShine 3s ease-in-out infinite;
        }
        
        @keyframes headerShine {
            0%, 100% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            50% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-magenta) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        
        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .panel {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-cyan);
            border-radius: 4px;
            padding: 20px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 245, 0.2);
        }
        
        .panel-header {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .panel-header::before {
            content: '▸';
            color: var(--accent-magenta);
            animation: blink 1s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        #networkCanvas {
            width: 100%;
            height: 500px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 245, 0.3);
            border-radius: 4px;
        }
        
        #lossChart {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 245, 0.3);
            border-radius: 4px;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            background: rgba(0, 255, 245, 0.2);
            outline: none;
            border-radius: 3px;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent-cyan);
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-cyan);
            transition: all 0.2s ease;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            background: var(--accent-magenta);
            box-shadow: 0 0 15px var(--accent-magenta);
            transform: scale(1.2);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--accent-cyan);
            cursor: pointer;
            border-radius: 50%;
            border: none;
            box-shadow: 0 0 10px var(--accent-cyan);
        }
        
        .value-display {
            display: inline-block;
            background: rgba(0, 255, 245, 0.1);
            padding: 4px 12px;
            border-radius: 3px;
            font-weight: 700;
            color: var(--accent-cyan);
            float: right;
            font-size: 0.9rem;
        }
        
        button {
            width: 100%;
            padding: 15px;
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-magenta) 100%);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        button:hover::before {
            width: 300px;
            height: 300px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 245, 0.5);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button span {
            position: relative;
            z-index: 1;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-box {
            background: rgba(0, 255, 245, 0.05);
            border: 1px solid rgba(0, 255, 245, 0.3);
            border-radius: 4px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-cyan);
            font-family: 'Orbitron', monospace;
        }
        
        .training-data {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 245, 0.3);
            border-radius: 4px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .data-point {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background: rgba(0, 255, 245, 0.05);
            border-radius: 3px;
            font-size: 0.85rem;
        }
        
        .data-input {
            color: var(--accent-yellow);
            font-weight: 700;
        }
        
        .data-output {
            color: var(--accent-magenta);
            font-weight: 700;
        }
        
        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
        
        .pulse {
            animation: pulse 0.6s ease-out;
        }
        
        @keyframes pulse {
            0% { r: attr(r); opacity: 1; }
            100% { r: calc(attr(r) * 2); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Neural Network Visualizer</h1>
            <p class="subtitle">Backpropagation from Scratch • XOR Problem</p>
        </header>
        
        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">Network Architecture</div>
                <canvas id="networkCanvas"></canvas>
                
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-label">Epoch</div>
                        <div class="stat-value" id="epochDisplay">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Loss</div>
                        <div class="stat-value" id="lossDisplay">0.000</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Accuracy</div>
                        <div class="stat-value" id="accuracyDisplay">0%</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Learning Rate</div>
                        <div class="stat-value" id="lrDisplay">0.5</div>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-header">Loss Function</div>
                <canvas id="lossChart"></canvas>
                
                <div class="panel-header" style="margin-top: 30px;">Training Data (XOR)</div>
                <div class="training-data">
                    <div class="data-point">
                        <span class="data-input">[0, 0]</span>
                        <span>→</span>
                        <span class="data-output">[0]</span>
                    </div>
                    <div class="data-point">
                        <span class="data-input">[0, 1]</span>
                        <span>→</span>
                        <span class="data-output">[1]</span>
                    </div>
                    <div class="data-point">
                        <span class="data-input">[1, 0]</span>
                        <span>→</span>
                        <span class="data-output">[1]</span>
                    </div>
                    <div class="data-point">
                        <span class="data-input">[1, 1]</span>
                        <span>→</span>
                        <span class="data-output">[0]</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">Training Controls</div>
            
            <div class="control-group">
                <label class="control-label">
                    Learning Rate
                    <span class="value-display" id="learningRateValue">0.5</span>
                </label>
                <input type="range" id="learningRate" min="0.01" max="2" step="0.01" value="0.5">
            </div>
            
            <div class="control-group">
                <label class="control-label">
                    Hidden Layer Size
                    <span class="value-display" id="hiddenSizeValue">4</span>
                </label>
                <input type="range" id="hiddenSize" min="2" max="8" step="1" value="4">
            </div>
            
            <div class="control-group">
                <label class="control-label">
                    Animation Speed
                    <span class="value-display" id="speedValue">50ms</span>
                </label>
                <input type="range" id="animationSpeed" min="10" max="200" step="10" value="50">
            </div>
            
            <button id="trainButton"><span>START TRAINING</span></button>
        </div>
    </div>
    
    <script>
        /**
         * ========================================================================
         * NEURAL NETWORK FROM SCRATCH - MATHEMATICAL FOUNDATION
         * ========================================================================
         * 
         * This implementation demonstrates backpropagation with detailed matrix
         * mathematics. We build everything from first principles.
         * 
         * NETWORK ARCHITECTURE:
         * - Input Layer: 2 neurons (for XOR inputs)
         * - Hidden Layer: configurable (default 4 neurons)
         * - Output Layer: 1 neuron (for XOR output)
         * 
         * ACTIVATION FUNCTION: Sigmoid
         * σ(x) = 1 / (1 + e^(-x))
         * σ'(x) = σ(x) * (1 - σ(x))
         * 
         * LOSS FUNCTION: Mean Squared Error (MSE)
         * L = (1/n) * Σ(y_pred - y_true)²
         */
        
        class NeuralNetwork {
            /**
             * Initialize the neural network with random weights and biases.
             * 
             * WEIGHT INITIALIZATION:
             * Weights are initialized using Xavier/Glorot initialization:
             * W ~ U(-√(6/(n_in + n_out)), √(6/(n_in + n_out)))
             * 
             * This helps prevent vanishing/exploding gradients during training.
             */
            constructor(inputSize, hiddenSize, outputSize) {
                this.inputSize = inputSize;
                this.hiddenSize = hiddenSize;
                this.outputSize = outputSize;
                
                // Initialize weights using Xavier initialization
                const limitHidden = Math.sqrt(6 / (inputSize + hiddenSize));
                const limitOutput = Math.sqrt(6 / (hiddenSize + outputSize));
                
                // Weights from input to hidden layer: [hiddenSize × inputSize]
                this.weightsInputHidden = this.randomMatrix(hiddenSize, inputSize, -limitHidden, limitHidden);
                
                // Biases for hidden layer: [hiddenSize × 1]
                this.biasHidden = this.randomMatrix(hiddenSize, 1, -0.5, 0.5);
                
                // Weights from hidden to output layer: [outputSize × hiddenSize]
                this.weightsHiddenOutput = this.randomMatrix(outputSize, hiddenSize, -limitOutput, limitOutput);
                
                // Biases for output layer: [outputSize × 1]
                this.biasOutput = this.randomMatrix(outputSize, 1, -0.5, 0.5);
                
                // Store activations for visualization
                this.lastInputActivations = null;
                this.lastHiddenActivations = null;
                this.lastOutputActivations = null;
            }
            
            /**
             * Create a matrix filled with random values in the specified range.
             */
            randomMatrix(rows, cols, min, max) {
                const matrix = [];
                for (let i = 0; i < rows; i++) {
                    matrix[i] = [];
                    for (let j = 0; j < cols; j++) {
                        matrix[i][j] = Math.random() * (max - min) + min;
                    }
                }
                return matrix;
            }
            
            /**
             * SIGMOID ACTIVATION FUNCTION
             * 
             * σ(x) = 1 / (1 + e^(-x))
             * 
             * Properties:
             * - Output range: (0, 1)
             * - Smooth, differentiable
             * - Used for binary classification
             */
            sigmoid(x) {
                return 1 / (1 + Math.exp(-x));
            }
            
            /**
             * SIGMOID DERIVATIVE
             * 
             * σ'(x) = σ(x) * (1 - σ(x))
             * 
             * This derivative is used during backpropagation to compute gradients.
             * Note: We compute this from the already-activated value for efficiency.
             */
            sigmoidDerivative(sigmoidOutput) {
                return sigmoidOutput * (1 - sigmoidOutput);
            }
            
            /**
             * MATRIX MULTIPLICATION
             * 
             * C = A × B where:
             * - A is [m × n]
             * - B is [n × p]
             * - C is [m × p]
             * 
             * C[i][j] = Σ(k=0 to n-1) A[i][k] * B[k][j]
             */
            matrixMultiply(a, b) {
                const result = [];
                for (let i = 0; i < a.length; i++) {
                    result[i] = [];
                    for (let j = 0; j < b[0].length; j++) {
                        let sum = 0;
                        for (let k = 0; k < b.length; k++) {
                            sum += a[i][k] * b[k][j];
                        }
                        result[i][j] = sum;
                    }
                }
                return result;
            }
            
            /**
             * MATRIX ADDITION
             * C = A + B (element-wise)
             */
            matrixAdd(a, b) {
                const result = [];
                for (let i = 0; i < a.length; i++) {
                    result[i] = [];
                    for (let j = 0; j < a[0].length; j++) {
                        result[i][j] = a[i][j] + b[i][j];
                    }
                }
                return result;
            }
            
            /**
             * MATRIX TRANSPOSE
             * 
             * A^T where A[i][j] becomes A^T[j][i]
             * 
             * If A is [m × n], then A^T is [n × m]
             */
            transpose(matrix) {
                const result = [];
                for (let j = 0; j < matrix[0].length; j++) {
                    result[j] = [];
                    for (let i = 0; i < matrix.length; i++) {
                        result[j][i] = matrix[i][j];
                    }
                }
                return result;
            }
            
            /**
             * Apply activation function element-wise to a matrix
             */
            applyActivation(matrix, activationFn) {
                return matrix.map(row => row.map(val => activationFn(val)));
            }
            
            /**
             * FORWARD PROPAGATION
             * 
             * Compute the network's prediction for a given input.
             * 
             * MATHEMATICAL FLOW:
             * 
             * 1. Input to Hidden Layer:
             *    z_hidden = W_ih × input + b_h
             *    a_hidden = σ(z_hidden)
             *    
             *    where:
             *    - W_ih is [hiddenSize × inputSize]
             *    - input is [inputSize × 1]
             *    - b_h is [hiddenSize × 1]
             *    - z_hidden is [hiddenSize × 1] (pre-activation)
             *    - a_hidden is [hiddenSize × 1] (post-activation)
             * 
             * 2. Hidden to Output Layer:
             *    z_output = W_ho × a_hidden + b_o
             *    a_output = σ(z_output)
             *    
             *    where:
             *    - W_ho is [outputSize × hiddenSize]
             *    - a_hidden is [hiddenSize × 1]
             *    - b_o is [outputSize × 1]
             *    - z_output is [outputSize × 1] (pre-activation)
             *    - a_output is [outputSize × 1] (final prediction)
             */
            forward(input) {
                // Convert input to column vector [inputSize × 1]
                const inputMatrix = input.map(val => [val]);
                
                // Layer 1: Input → Hidden
                const hiddenZ = this.matrixAdd(
                    this.matrixMultiply(this.weightsInputHidden, inputMatrix),
                    this.biasHidden
                );
                const hiddenActivation = this.applyActivation(hiddenZ, x => this.sigmoid(x));
                
                // Layer 2: Hidden → Output
                const outputZ = this.matrixAdd(
                    this.matrixMultiply(this.weightsHiddenOutput, hiddenActivation),
                    this.biasOutput
                );
                const outputActivation = this.applyActivation(outputZ, x => this.sigmoid(x));
                
                // Store activations for visualization
                this.lastInputActivations = inputMatrix;
                this.lastHiddenActivations = hiddenActivation;
                this.lastOutputActivations = outputActivation;
                
                return outputActivation;
            }
            
            /**
             * BACKPROPAGATION
             * 
             * Compute gradients using the chain rule and update weights.
             * 
             * LOSS FUNCTION (Mean Squared Error):
             * L = (1/2) * (y_pred - y_true)²
             * 
             * GRADIENT COMPUTATION (Chain Rule):
             * 
             * 1. Output Layer Error:
             *    δ_output = (a_output - y_true) ⊙ σ'(a_output)
             *    
             *    where ⊙ denotes element-wise multiplication (Hadamard product)
             *    
             *    This represents ∂L/∂z_output, the gradient of loss w.r.t. pre-activation
             * 
             * 2. Output Layer Weight Gradients:
             *    ∂L/∂W_ho = δ_output × a_hidden^T
             *    ∂L/∂b_o = δ_output
             *    
             *    These tell us how to adjust weights and biases for the output layer.
             * 
             * 3. Hidden Layer Error (Backpropagate error):
             *    δ_hidden = (W_ho^T × δ_output) ⊙ σ'(a_hidden)
             *    
             *    This propagates the error backward through the network using the
             *    transpose of the weight matrix.
             * 
             * 4. Hidden Layer Weight Gradients:
             *    ∂L/∂W_ih = δ_hidden × input^T
             *    ∂L/∂b_h = δ_hidden
             * 
             * 5. WEIGHT UPDATE (Gradient Descent):
             *    W_new = W_old - α * ∂L/∂W
             *    b_new = b_old - α * ∂L/∂b
             *    
             *    where α is the learning rate (controls step size)
             */
            train(input, target, learningRate) {
                // Forward pass
                const output = this.forward(input);
                
                // Convert target to column vector
                const targetMatrix = target.map(val => [val]);
                
                // ===== BACKPROPAGATION BEGINS =====
                
                // 1. Compute output layer error
                // δ_output = (prediction - target) ⊙ σ'(output)
                const outputError = [];
                for (let i = 0; i < output.length; i++) {
                    const error = output[i][0] - targetMatrix[i][0];
                    const derivative = this.sigmoidDerivative(output[i][0]);
                    outputError[i] = [error * derivative];
                }
                
                // 2. Compute gradients for output layer weights
                // ∂L/∂W_ho = δ_output × a_hidden^T
                const hiddenTranspose = this.transpose(this.lastHiddenActivations);
                const weightsHOGradient = this.matrixMultiply(outputError, hiddenTranspose);
                
                // 3. Backpropagate error to hidden layer
                // δ_hidden = (W_ho^T × δ_output) ⊙ σ'(a_hidden)
                const weightsHOTranspose = this.transpose(this.weightsHiddenOutput);
                const hiddenErrorRaw = this.matrixMultiply(weightsHOTranspose, outputError);
                
                const hiddenError = [];
                for (let i = 0; i < hiddenErrorRaw.length; i++) {
                    const derivative = this.sigmoidDerivative(this.lastHiddenActivations[i][0]);
                    hiddenError[i] = [hiddenErrorRaw[i][0] * derivative];
                }
                
                // 4. Compute gradients for hidden layer weights
                // ∂L/∂W_ih = δ_hidden × input^T
                const inputTranspose = this.transpose(this.lastInputActivations);
                const weightsIHGradient = this.matrixMultiply(hiddenError, inputTranspose);
                
                // ===== GRADIENT DESCENT UPDATE =====
                
                // Update output layer weights: W = W - α * ∂L/∂W
                for (let i = 0; i < this.weightsHiddenOutput.length; i++) {
                    for (let j = 0; j < this.weightsHiddenOutput[0].length; j++) {
                        this.weightsHiddenOutput[i][j] -= learningRate * weightsHOGradient[i][j];
                    }
                }
                
                // Update output layer biases: b = b - α * ∂L/∂b
                for (let i = 0; i < this.biasOutput.length; i++) {
                    this.biasOutput[i][0] -= learningRate * outputError[i][0];
                }
                
                // Update hidden layer weights
                for (let i = 0; i < this.weightsInputHidden.length; i++) {
                    for (let j = 0; j < this.weightsInputHidden[0].length; j++) {
                        this.weightsInputHidden[i][j] -= learningRate * weightsIHGradient[i][j];
                    }
                }
                
                // Update hidden layer biases
                for (let i = 0; i < this.biasHidden.length; i++) {
                    this.biasHidden[i][0] -= learningRate * hiddenError[i][0];
                }
                
                // Return mean squared error for this sample
                const mse = Math.pow(output[0][0] - targetMatrix[0][0], 2);
                return mse;
            }
            
            /**
             * Predict output for a given input (wrapper around forward)
             */
            predict(input) {
                return this.forward(input)[0][0];
            }
        }
        
        // ========================================================================
        // VISUALIZATION ENGINE
        // ========================================================================
        
        class NetworkVisualizer {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.neuronRadius = 25;
                this.neurons = { input: [], hidden: [], output: [] };
                this.animationQueue = [];
                
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
            }
            
            resizeCanvas() {
                const rect = this.canvas.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
            }
            
            /**
             * Calculate neuron positions for visualization
             */
            calculatePositions(network) {
                const width = this.canvas.width;
                const height = this.canvas.height;
                const margin = 80;
                
                // Input layer (left)
                const inputSpacing = (height - 2 * margin) / (network.inputSize + 1);
                this.neurons.input = [];
                for (let i = 0; i < network.inputSize; i++) {
                    this.neurons.input.push({
                        x: margin,
                        y: margin + inputSpacing * (i + 1),
                        activation: 0
                    });
                }
                
                // Hidden layer (middle)
                const hiddenSpacing = (height - 2 * margin) / (network.hiddenSize + 1);
                this.neurons.hidden = [];
                for (let i = 0; i < network.hiddenSize; i++) {
                    this.neurons.hidden.push({
                        x: width / 2,
                        y: margin + hiddenSpacing * (i + 1),
                        activation: 0
                    });
                }
                
                // Output layer (right)
                this.neurons.output = [];
                this.neurons.output.push({
                    x: width - margin,
                    y: height / 2,
                    activation: 0
                });
            }
            
            /**
             * Draw the complete network with animated weights and neurons
             */
            draw(network) {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Update neuron activations from network
                if (network.lastInputActivations) {
                    for (let i = 0; i < network.inputSize; i++) {
                        this.neurons.input[i].activation = network.lastInputActivations[i][0];
                    }
                }
                if (network.lastHiddenActivations) {
                    for (let i = 0; i < network.hiddenSize; i++) {
                        this.neurons.hidden[i].activation = network.lastHiddenActivations[i][0];
                    }
                }
                if (network.lastOutputActivations) {
                    this.neurons.output[0].activation = network.lastOutputActivations[0][0];
                }
                
                // Draw connections (weights)
                this.drawWeights(this.neurons.input, this.neurons.hidden, network.weightsInputHidden);
                this.drawWeights(this.neurons.hidden, this.neurons.output, network.weightsHiddenOutput);
                
                // Draw neurons
                this.drawNeurons(this.neurons.input, 'INPUT');
                this.drawNeurons(this.neurons.hidden, 'HIDDEN');
                this.drawNeurons(this.neurons.output, 'OUTPUT');
            }
            
            /**
             * Draw weighted connections between layers
             * Color and thickness represent weight magnitude and sign
             */
            drawWeights(fromLayer, toLayer, weights) {
                for (let i = 0; i < toLayer.length; i++) {
                    for (let j = 0; j < fromLayer.length; j++) {
                        const weight = weights[i][j];
                        const from = fromLayer[j];
                        const to = toLayer[i];
                        
                        // Color: cyan for positive, magenta for negative
                        const absWeight = Math.abs(weight);
                        const maxWeight = 3; // Normalization factor
                        const opacity = Math.min(absWeight / maxWeight, 1);
                        
                        const color = weight > 0 
                            ? `rgba(0, 255, 245, ${opacity * 0.6})` 
                            : `rgba(255, 0, 229, ${opacity * 0.6})`;
                        
                        // Thickness: proportional to weight magnitude
                        const thickness = 1 + absWeight * 2;
                        
                        this.ctx.beginPath();
                        this.ctx.strokeStyle = color;
                        this.ctx.lineWidth = thickness;
                        this.ctx.moveTo(from.x, from.y);
                        this.ctx.lineTo(to.x, to.y);
                        this.ctx.stroke();
                    }
                }
            }
            
            /**
             * Draw neurons with glow effect based on activation
             */
            drawNeurons(layer, label) {
                layer.forEach((neuron, i) => {
                    const activation = neuron.activation || 0;
                    
                    // Outer glow (scales with activation)
                    const gradient = this.ctx.createRadialGradient(
                        neuron.x, neuron.y, 0,
                        neuron.x, neuron.y, this.neuronRadius * 2
                    );
                    gradient.addColorStop(0, `rgba(0, 255, 245, ${activation * 0.6})`);
                    gradient.addColorStop(1, 'rgba(0, 255, 245, 0)');
                    
                    this.ctx.beginPath();
                    this.ctx.fillStyle = gradient;
                    this.ctx.arc(neuron.x, neuron.y, this.neuronRadius * 2, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // Neuron body
                    this.ctx.beginPath();
                    this.ctx.fillStyle = `rgba(10, 14, 39, 0.9)`;
                    this.ctx.arc(neuron.x, neuron.y, this.neuronRadius, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // Neuron border (brightness based on activation)
                    this.ctx.beginPath();
                    this.ctx.strokeStyle = `rgba(0, 255, 245, ${0.3 + activation * 0.7})`;
                    this.ctx.lineWidth = 2;
                    this.ctx.arc(neuron.x, neuron.y, this.neuronRadius, 0, Math.PI * 2);
                    this.ctx.stroke();
                    
                    // Activation value
                    this.ctx.fillStyle = 'rgba(224, 230, 255, 0.9)';
                    this.ctx.font = 'bold 11px JetBrains Mono';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(activation.toFixed(2), neuron.x, neuron.y);
                    
                    // Layer label
                    if (i === 0) {
                        this.ctx.fillStyle = 'rgba(136, 146, 184, 0.8)';
                        this.ctx.font = '10px Orbitron';
                        this.ctx.textAlign = 'center';
                        this.ctx.fillText(label, neuron.x, neuron.y - this.neuronRadius - 15);
                    }
                });
            }
        }
        
        // ========================================================================
        // LOSS CHART VISUALIZER
        // ========================================================================
        
        class LossChart {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.lossHistory = [];
                this.maxHistory = 200;
                
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
            }
            
            resizeCanvas() {
                const rect = this.canvas.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
            }
            
            addLoss(loss) {
                this.lossHistory.push(loss);
                if (this.lossHistory.length > this.maxHistory) {
                    this.lossHistory.shift();
                }
                this.draw();
            }
            
            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                if (this.lossHistory.length < 2) return;
                
                const width = this.canvas.width;
                const height = this.canvas.height;
                const padding = 40;
                const chartWidth = width - 2 * padding;
                const chartHeight = height - 2 * padding;
                
                // Find max loss for scaling
                const maxLoss = Math.max(...this.lossHistory, 0.1);
                
                // Draw grid
                this.ctx.strokeStyle = 'rgba(0, 255, 245, 0.1)';
                this.ctx.lineWidth = 1;
                for (let i = 0; i <= 5; i++) {
                    const y = padding + (chartHeight / 5) * i;
                    this.ctx.beginPath();
                    this.ctx.moveTo(padding, y);
                    this.ctx.lineTo(width - padding, y);
                    this.ctx.stroke();
                }
                
                // Draw loss curve
                this.ctx.beginPath();
                this.ctx.strokeStyle = 'rgba(0, 255, 245, 0.8)';
                this.ctx.lineWidth = 2;
                
                const step = chartWidth / (this.maxHistory - 1);
                
                this.lossHistory.forEach((loss, i) => {
                    const x = padding + i * step;
                    const y = padding + chartHeight - (loss / maxLoss) * chartHeight;
                    
                    if (i === 0) {
                        this.ctx.moveTo(x, y);
                    } else {
                        this.ctx.lineTo(x, y);
                    }
                });
                
                this.ctx.stroke();
                
                // Draw glow effect on curve
                this.ctx.shadowBlur = 10;
                this.ctx.shadowColor = 'rgba(0, 255, 245, 0.5)';
                this.ctx.stroke();
                this.ctx.shadowBlur = 0;
                
                // Draw axes labels
                this.ctx.fillStyle = 'rgba(136, 146, 184, 0.8)';
                this.ctx.font = '10px JetBrains Mono';
                this.ctx.textAlign = 'right';
                this.ctx.fillText(maxLoss.toFixed(3), padding - 5, padding + 5);
                this.ctx.fillText('0.000', padding - 5, height - padding + 5);
                
                this.ctx.textAlign = 'center';
                this.ctx.fillText('EPOCH', width / 2, height - 10);
            }
        }
        
        // ========================================================================
        // TRAINING CONTROLLER
        // ========================================================================
        
        let network;
        let visualizer;
        let lossChart;
        let isTraining = false;
        let epoch = 0;
        
        // XOR training data
        const trainingData = [
            { input: [0, 0], output: [0] },
            { input: [0, 1], output: [1] },
            { input: [1, 0], output: [1] },
            { input: [1, 1], output: [0] }
        ];
        
        // Initialize
        function init() {
            const hiddenSize = parseInt(document.getElementById('hiddenSize').value);
            network = new NeuralNetwork(2, hiddenSize, 1);
            visualizer = new NetworkVisualizer('networkCanvas');
            lossChart = new LossChart('lossChart');
            
            visualizer.calculatePositions(network);
            visualizer.draw(network);
            
            epoch = 0;
            updateStats(0, 0);
        }
        
        // Training loop
        async function trainNetwork() {
            if (isTraining) {
                isTraining = false;
                document.getElementById('trainButton').innerHTML = '<span>START TRAINING</span>';
                return;
            }
            
            isTraining = true;
            document.getElementById('trainButton').innerHTML = '<span>STOP TRAINING</span>';
            
            const learningRate = parseFloat(document.getElementById('learningRate').value);
            const animationSpeed = parseInt(document.getElementById('animationSpeed').value);
            
            while (isTraining) {
                let totalLoss = 0;
                
                // Train on all samples
                for (const sample of trainingData) {
                    const loss = network.train(sample.input, sample.output, learningRate);
                    totalLoss += loss;
                    
                    // Update visualization for this sample
                    visualizer.draw(network);
                    await sleep(animationSpeed);
                }
                
                const avgLoss = totalLoss / trainingData.length;
                const accuracy = calculateAccuracy();
                
                epoch++;
                lossChart.addLoss(avgLoss);
                updateStats(avgLoss, accuracy);
                
                await sleep(10);
            }
        }
        
        // Calculate accuracy
        function calculateAccuracy() {
            let correct = 0;
            for (const sample of trainingData) {
                const prediction = network.predict(sample.input);
                const rounded = Math.round(prediction);
                if (rounded === sample.output[0]) correct++;
            }
            return (correct / trainingData.length) * 100;
        }
        
        // Update UI stats
        function updateStats(loss, accuracy) {
            document.getElementById('epochDisplay').textContent = epoch;
            document.getElementById('lossDisplay').textContent = loss.toFixed(3);
            document.getElementById('accuracyDisplay').textContent = accuracy.toFixed(0) + '%';
            document.getElementById('lrDisplay').textContent = document.getElementById('learningRate').value;
        }
        
        // Helper: sleep function
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // Event listeners
        document.getElementById('trainButton').addEventListener('click', trainNetwork);
        
        document.getElementById('learningRate').addEventListener('input', (e) => {
            document.getElementById('learningRateValue').textContent = e.target.value;
        });
        
        document.getElementById('hiddenSize').addEventListener('input', (e) => {
            document.getElementById('hiddenSizeValue').textContent = e.target.value;
            if (!isTraining) init();
        });
        
        document.getElementById('animationSpeed').addEventListener('input', (e) => {
            document.getElementById('speedValue').textContent = e.target.value + 'ms';
        });
        
        // Initialize on load
        init();
    </script>
